<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    

    <p>

    <p id="numdot">1996HondaCivicEX</p>

    </p>
    <button type="button" id="nON">Normal On</button>
    <button type="button" id="nOFF">Normal Off</button>
    <p>

    
    <p>
    Light X<input type="range" min="-250" max="250" value="0" class="slider" id="xlight">
    <p>
    Light Y<input type="range" min="-250" max="250" value="0" class="slider" id="ylight">
    <p>
    Light Z<input type="range" min="-250" max="250" value="0" class="slider" id="zlight">

    <p>
    Light
    <button type="button" id="lighton">ON</button>
    <button type="button" id="lightoff">OFF</button>>

    </p>
    Spotlight
    <button type="button" id="spoton">ON</button>
    <button type="button" id="spotoff">OFF</button>


    <p>
    <button type="button" id="green">Green</button>
    <button type="button" id="red">Red</button>
    <button type="button" id="clear">Clear</button>
    <button type="button" id="undo">Undo</button>

    <p>
    <button type="button" id="point">Point</button>
    <button type="button" id="triangle">Triangle</button>
    <button type="button" id="circle">Circle</button>

    <p>
    Red<input type="range" min="0" max="100" value="0" class="slider" id="redSlide">
    <p>
    Green<input type="range" min="0" max="100" value="0" class="slider" id="greenSlide">
    <p>
    Blue<input type="range" min="0" max="100" value="0" class="slider" id="blueSlide">
    <p>
    Joint<input type="range" min="-45" max="45" value="0" class="slider" id="jointSlide">
    Animation:
    <button type="button" id="on">ON</button>
    <button type="button" id="off">OFF</button>

    <p>
    Joint<input type="range" min="-45" max="45" value="0" class="slider" id="magentaSlide">
    Animation:
    <button type="button" id="mon">ON</button>
    <button type="button" id="moff">OFF</button>
    <p>
    Camera Angle<input type="range" min="0" max="3600" value="0" class="slider" id="angleSlide">

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
   
    <script src="Point.js"></script>
    <script src="Triangle2.js"></script>
    <script src="Circle.js"></script>
    <script src="Cube2.js"></script>
    <script src="Cylinder.js"></script>
    <script src="Sphere.js"></script>
    <script src="Vector.js"></script>
    <script src="Camera.js"></script>
    <script src="World.js"></script>
    
    

  </body>
</html>
